<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="main.js" defer></script>
    <title>Consulta CEP</title>
</head>
<body>

    <main class="container">
        <h1 class="title">Consulta de CEP</h1>

        <div class="row">
            <div class="inputbox">
                <input type="text" id="nome" required>
                <label>Nome</label>
            </div>

            <div class="inputbox">
                <input type="email" id="email" required>
                <label>Email</label>
            </div>
        </div>

        <div class="row">
            <div class="inputbox">
                <input type="text" id="cep" required>
                <label>CEP</label>
            </div>

            <div class="inputbox">
                <input type="text" id="street" required>
                <label>Endereço</label>
            </div>
        </div>

        <div class="row">
            <div class="inputbox">
                <input type="text" id="number" required>
                <label>Número</label>
            </div>

            <div class="inputbox">
                <input type="text" id="neighborhood" required>
                <label>Bairro</label>
            </div>
        </div>

        <div class="row">
            <div class="inputbox">
                <input type="text" id="city" required>
                <label>Cidade</label>
            </div>

            <div class="inputbox">
                <input type="text" id="state" required>
                <label>Estado</label>
            </div>
        </div>

        <div class="row">
            <button id="btn">Buscar CEP</button>
        </div>
    </main>

    <footer>
        <p>© Lucas Alexandre - Brasil API</p>
    </footer>

</body>
</html>
